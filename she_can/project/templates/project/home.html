{% extends 'project/base.html' %}
{% block content %}
<h1>She Can</h1>
<div style="border: 2px solid black; border-radius: 10px; padding: 20px; background-color: #f8f9fa;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label" for="name">Name</label>
            <input name="name" class="form-control" id="name" type="text" placeholder="Enter your name">
            <label class="form-label" for="email">Email</label>
            <input name="email" class="form-control" id="email" type="email" placeholder="Enter your email">
            <label class="form-label" for="message">Message</label>
            <textarea name="message" class="form-control" id="message" placeholder="Enter your message"></textarea>
            <button class="btn btn-primary" type="submit">Submit</button>
        </div>
    </form>
</div>
{% endblock %}
